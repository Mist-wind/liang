<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开发者主页</title>
    <style>
        /* 基础页面设置：暗黑风格 */
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 主容器 */
        .container {
            width: 90%;
            max-width: 800px;
            padding: 40px 20px;
        }

        /* 个人介绍区域 */
        .profile-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 1s ease;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 2px solid #d4af37; /* 黑金风格的金色边框 */
            margin-bottom: 20px;
            object-fit: cover;
        }

        .profile-name {
            font-size: 2em;
            margin: 0 0 10px 0;
            letter-spacing: 2px;
        }

        .profile-bio {
            color: #888888;
            font-size: 1.1em;
            margin: 0;
        }

        /* 应用卡片网格布局 */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            animation: fadeInUp 1s ease;
        }

        /* 单个应用卡片样式 */
        .app-card {
            background-color: #1a1a1a;
            border: 1px solid #333333;
            border-radius: 16px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* 卡片悬停特效（跳转感） */
        .app-card:hover {
            transform: translateY(-8px);
            border-color: #d4af37;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.15);
        }

        .app-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .app-title {
            color: #d4af37;
            font-size: 1.3em;
            margin: 0 0 10px 0;
        }

        .app-desc {
            color: #aaaaaa;
            font-size: 0.9em;
            line-height: 1.5;
            margin: 0;
        }

        /* 简单的进场动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-section">
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=developer" alt="头像" class="profile-avatar">
            <h1 class="profile-name">Liang</h1>
            <p class="profile-bio">独立开发者 | 专注于沉浸式流媒体与应用开发</p>
        </div>

        <div class="apps-grid">
            
            <a href="http://47.122.119.75" target="_blank" class="app-card">
                <div class="app-icon">🎬</div>
                <h2 class="app-title">黑果短剧</h2>
                <p class="app-desc">私有化短剧平台，将本地短剧库变成专属流媒体。随时随地，高清畅享。</p>
            </a>

            <a href="#" target="_blank" class="app-card">
                <div class="app-icon">🚀</div>
                <h2 class="app-title">待定应用</h2>
                <p class="app-desc">下一款改变世界的应用正在开发中，敬请期待。</p>
            </a>

            <a href="https://github.com/2550214996lw-rgb" target="_blank" class="app-card">
                <div class="app-icon">💻</div>
                <h2 class="app-title">我的 GitHub</h2>
                <p class="app-desc">查看我的更多开源项目和技术分享。</p>
            </a>

        </div>
    </div>

</body>
</html>
