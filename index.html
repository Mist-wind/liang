<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沉浸式项目画廊 - 堆叠版</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="bg-layer" id="bg-layer"></div>
        <div class="overlay"></div>

        <div class="content-layer">
            <h2 id="sub-title">FEATURED PROJECT</h2>
            <h1 id="main-title">标题加载中</h1>
            <p id="main-desc">描述加载中...</p>
            <button class="explore-btn">查看详情</button>
        </div>
        <div class="slider-controls">
            <button id="prev-btn" class="ctrl-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
            </button>
            <button id="next-btn" class="ctrl-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
            </button>
        </div>
        <div class="cards-wrapper" id="cards-wrapper">
            </div>
    </div>

    <script src="script.js" defer></script>
</body>
</html>
