<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liang | 沉浸式作品集</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="top-nav">
        <a href="#section1" class="nav-btn active" data-target="section1">首页</a>
            <a href="#section2" class="nav-btn" data-target="section2">黑果短剧</a>
            <a href="#section3" class="nav-btn" data-target="section3">AI桌面宠物</a>
            <a href="#section4" class="nav-btn" data-target="section4">未来计划</a>
            <a href="#section5" class="nav-btn" data-target="section5">项目进度</a>
    </nav>

    <main class="scroll-container">
        
        <section id="section1" class="page-section">
            <div class="content-box">
                <h1 class="main-title">LIANG</h1>
                <p class="sub-title">独立开发者 / 创造沉浸式数字体验</p>

            </div>
        </section>

        <section id="section2" class="page-section">
            <div class="app-card">
                <div class="app-logo">🎬</div>
                <h2 class="app-title">黑果短剧</h2>
                <p class="app-desc">私有化短剧平台，本地短剧库变专属流媒体</p>
                <a href="http://47.122.119.75" target="_blank" class="download-btn">下载 Android 客户端</a>
            </div>
        </section>

        <section id="section3" class="page-section">
            <div class="app-card">
                <div class="app-logo">🐱</div>
                <h2 class="app-title">AI桌面宠物</h2>
                <p class="app-desc">智能陪伴，个性化互动，让桌面更有趣</p>
                <a href="#" target="_blank" class="download-btn git-btn">了解更多</a>
            </div>
        </section>

        <section id="section4" class="page-section">
            <div class="content-box">
                <h1 class="main-title">未来计划</h1>
                <p class="sub-title">探索更多创新项目，持续提升用户体验</p>
            </div>
        </section>

        <section id="section5" class="page-section">
            <div class="progress-container">
                <div class="progress-header">
                    <h1 class="main-title">项目进度</h1>
                    <button class="edit-toggle-btn" id="editToggle">编辑模式</button>
                </div>
                <div class="progress-list" id="progressList">
                    <div class="progress-item" data-id="1">
                        <div class="progress-info">
                            <h3 class="project-name">黑果短剧</h3>
                            <p class="project-desc">私有化短剧平台</p>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: 85%">
                                <span class="progress-text">85%</span>
                            </div>
                        </div>
                        <div class="progress-actions">
                            <button class="progress-edit-btn" onclick="editProgress(1)">编辑</button>
                            <button class="progress-delete-btn" onclick="deleteProgress(1)">删除</button>
                        </div>
                    </div>
                    <div class="progress-item" data-id="2">
                        <div class="progress-info">
                            <h3 class="project-name">AI桌面宠物</h3>
                            <p class="project-desc">智能陪伴应用</p>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: 45%">
                                <span class="progress-text">45%</span>
                            </div>
                        </div>
                        <div class="progress-actions">
                            <button class="progress-edit-btn" onclick="editProgress(2)">编辑</button>
                            <button class="progress-delete-btn" onclick="deleteProgress(2)">删除</button>
                        </div>
                    </div>
                    <div class="progress-item" data-id="3">
                        <div class="progress-info">
                            <h3 class="project-name">新项目</h3>
                            <p class="project-desc">待定项目</p>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: 20%">
                                <span class="progress-text">20%</span>
                            </div>
                        </div>
                        <div class="progress-actions">
                            <button class="progress-edit-btn" onclick="editProgress(3)">编辑</button>
                            <button class="progress-delete-btn" onclick="deleteProgress(3)">删除</button>
                        </div>
                    </div>
                </div>
                <button class="add-progress-btn" id="addProgressBtn">+ 添加新项目</button>
            </div>
        </section>

    </main>

    <div class="modal" id="progressModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">编辑项目</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-form">
                <div class="form-group">
                    <label>项目名称</label>
                    <input type="text" id="projectName" placeholder="输入项目名称">
                </div>
                <div class="form-group">
                    <label>项目描述</label>
                    <textarea id="projectDesc" placeholder="输入项目描述"></textarea>
                </div>
                <div class="form-group">
                    <label>进度百分比 (0-100)</label>
                    <input type="number" id="projectProgress" min="0" max="100" placeholder="输入进度百分比">
                </div>
                <div class="modal-buttons">
                    <button class="cancel-btn" onclick="closeModal()">取消</button>
                    <button class="save-btn" onclick="saveProgress()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
